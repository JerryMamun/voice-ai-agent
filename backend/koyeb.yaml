# Koyeb deployment configuration
# Docs: https://www.koyeb.com/docs/reference/koyeb-yaml

name: voice-ai-agent

services:
  - name: api
    type: web
    instance_type: free        # free tier: nano (256MB RAM)
    regions:
      - sin                    # Singapore — Bangladesh-এর কাছের region
    git:
      repository: JerryMamun/voice-ai-agent
      branch: main
      dockerfile: backend/Dockerfile   # root থেকে relative path
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    env:
      - key: GROQ_API_KEY
        secret: GROQ_API_KEY
      - key: DEEPGRAM_API_KEY
        secret: DEEPGRAM_API_KEY
      - key: ELEVENLABS_API_KEY
        secret: ELEVENLABS_API_KEY
    health_checks:
      - path: /health
        port: 8000
        protocol: http
        initial_delay_seconds: 15
        period_seconds: 30
        timeout_seconds: 5
        success_threshold: 1
        failure_threshold: 3
