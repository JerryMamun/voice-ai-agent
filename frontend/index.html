<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <img src="your-logo.png" alt="Logo" class="top-left-logo">
    <title>Voice AI Agent</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app">
        <header>
            <h1>🎙️ Voice AI Agent</h1>
            <p>বাংলায় কথা বলুন — AI সাথে সাথে উত্তর দেবে</p>
        </header>

        <!-- Chat History -->
        <div class="chat-box" id="chatBox">
            <div class="message ai">
                <span class="bubble">আস্সালামু আলাইকুম! আমি আপনার AI assistant। মাইক বাটন চেপে বাংলায় কথা বলুন। 😊</span>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar" id="statusBar">প্রস্তুত</div>

        <!-- Controls -->
        <div class="controls">
            <!-- Text input -->
            <div class="text-row">
                <input type="text" id="textInput" placeholder="অথবা এখানে টাইপ করুন..." />
                <button id="sendBtn" onclick="sendText()">পাঠান</button>
            </div>

            <!-- Mic button -->
            <button class="mic-btn" id="micBtn" onclick="toggleMic()">
                <span class="mic-icon">🎤</span>
                <span class="mic-label" id="micLabel">চাপুন</span>
            </button>

            <!-- Clear history -->
            <button class="clear-btn" onclick="clearHistory()">🗑️ ইতিহাস মুছুন</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
